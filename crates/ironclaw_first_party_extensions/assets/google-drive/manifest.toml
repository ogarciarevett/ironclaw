schema_version = "reborn.extension_manifest.v2"
id = "google-drive"
name = "Google Drive"
version = "0.1.0"
description = "Google Drive capabilities for searching, accessing, uploading, sharing, and organizing files and folders, including finding Google Sheets/spreadsheets, Docs, and Slides by name or title."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/google_drive_tool.wasm"

[[capabilities]]
id = "google-drive.list_files"
description = "Search or list files and folders, including Google Sheets/spreadsheets by name or title."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/drive.readonly"] } }, provider_scopes = ["https://www.googleapis.com/auth/drive.readonly"], audience = { scheme = "https", host_pattern = "www.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/list_files.input.v1.json"
output_schema_ref = "schemas/google-drive/raw_output.v1.json"
prompt_doc_ref = "prompts/google-drive/list_files.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "google-drive.get_file"
description = "Get file metadata."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/drive.readonly"] } }, provider_scopes = ["https://www.googleapis.com/auth/drive.readonly"], audience = { scheme = "https", host_pattern = "www.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/get_file.input.v1.json"
output_schema_ref = "schemas/google-drive/raw_output.v1.json"
prompt_doc_ref = "prompts/google-drive/get_file.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "google-drive.download_file"
description = "Download a file's content as text — including binary documents (PDF, PPTX, DOCX, XLSX), which are converted to extracted text automatically — or export a Google Workspace file. No shell or separate downloader needed."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/drive.readonly"] } }, provider_scopes = ["https://www.googleapis.com/auth/drive.readonly"], audience = { scheme = "https", host_pattern = "www.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/download_file.input.v1.json"
output_schema_ref = "schemas/google-drive/raw_output.v1.json"
prompt_doc_ref = "prompts/google-drive/download_file.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "google-drive.upload_file"
description = "Upload a new text file."
effects = ["dispatch_capability", "network", "use_secret", "external_write"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/drive"] } }, provider_scopes = ["https://www.googleapis.com/auth/drive"], audience = { scheme = "https", host_pattern = "www.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
