schema_version = "reborn.extension_manifest.v2"
id = "google-sheets"
name = "Google Sheets"
version = "0.1.0"
description = "Google Sheets capabilities for creating, reading, writing, and formatting spreadsheets. Use Google Drive list_files to find existing spreadsheets by name/title."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/google_sheets_tool.wasm"

[[capabilities]]
id = "google-sheets.create_spreadsheet"
description = "Create a new spreadsheet."
effects = ["dispatch_capability", "network", "use_secret", "external_write"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/spreadsheets"] } }, provider_scopes = ["https://www.googleapis.com/auth/spreadsheets"], audience = { scheme = "https", host_pattern = "sheets.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-sheets/create_spreadsheet.input.v1.json"
output_schema_ref = "schemas/google-sheets/raw_output.v1.json"
prompt_doc_ref = "prompts/google-sheets/create_spreadsheet.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "google-sheets.get_spreadsheet"
description = "Get spreadsheet metadata by spreadsheet ID. If the user only provided a spreadsheet name/title, search Google Drive first."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"] } }, provider_scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"], audience = { scheme = "https", host_pattern = "sheets.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-sheets/get_spreadsheet.input.v1.json"
output_schema_ref = "schemas/google-sheets/raw_output.v1.json"
prompt_doc_ref = "prompts/google-sheets/get_spreadsheet.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "google-sheets.read_values"
description = "Read cell values from a range by spreadsheet ID. If the user only provided a spreadsheet name/title, search Google Drive first."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "google_runtime_token", source = { type = "product_auth_account", provider = "google", setup = { kind = "oauth", scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"] } }, provider_scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"], audience = { scheme = "https", host_pattern = "sheets.googleapis.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
